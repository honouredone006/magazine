<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Horizon Magazine - Flipbook</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle at center, #4a4a4a 0%, #1a1a1a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }

        .flip-book {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            display: none;
        }

        .page {
            background-color: #fff;
            overflow: hidden;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: fill;
            display: block;
            pointer-events: none;
        }

        .page.--left  { box-shadow: inset  10px 0 20px rgba(0,0,0,0.12) !important; }
        .page.--right { box-shadow: inset -10px 0 20px rgba(0,0,0,0.12) !important; }

        #loader {
            color: white;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        /* Navigation buttons */
        #controls {
            display: none;
            margin-top: 16px;
            gap: 12px;
        }
        #controls button {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 22px;
            border-radius: 20px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        #controls button:hover { background: rgba(255,255,255,0.28); }
        #page-info {
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="loader">Loading Publication...</div>
    <div class="flip-book" id="magazine"></div>
    <div id="controls">
        <button id="btn-prev">‹ Prev</button>
        <button id="btn-next">Next ›</button>
    </div>
    <div id="page-info"></div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const bookContainer = document.getElementById('magazine');
            const loader        = document.getElementById('loader');
            const controls      = document.getElementById('controls');
            const pageInfo      = document.getElementById('page-info');
            const btnPrev       = document.getElementById('btn-prev');
            const btnNext       = document.getElementById('btn-next');

            const customPageOrder = [
                "1.png",
                "2.png",
                "3.png",
                "4.png",
                "5.png",
                "6.png",
                "7.png",
                "8.png",
                "9.png",
                "10.png",
                "11.png",
                "12.png"
            ];

            // Build page divs
            customPageOrder.forEach(fileName => {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                const img = document.createElement('img');
                img.src = fileName;
                img.alt = fileName;
                pageDiv.appendChild(img);
                bookContainer.appendChild(pageDiv);
            });

            // --- Responsive sizing ---
            // On mobile: single-page portrait; on desktop: two-page spread
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const isMobile = vw < 640;

            // Reserve space for controls (~60px) and padding (20px each side)
            const availH = vh - 80;
            const availW = vw - 40;

            // Page aspect ratio: adjust if your images are not A4
            // A4 = 1 : 1.4142  |  Letter = 1 : 1.2941
            const ASPECT = 1 / 1.4142;

            let pageW, pageH;
            if (isMobile) {
                // Single page fills available width
                pageW = availW;
                pageH = Math.round(pageW / ASPECT);
                if (pageH > availH) { pageH = availH; pageW = Math.round(pageH * ASPECT); }
            } else {
                // Two pages side by side → each page = half the spread width
                // spread width constrained by both availW and availH
                let spreadW = availW;
                let spreadH = Math.round((spreadW / 2) / ASPECT);
                if (spreadH > availH) { spreadH = availH; spreadW = Math.round(spreadH * ASPECT * 2); }
                pageW = Math.round(spreadW / 2);
                pageH = spreadH;
            }

            const pageFlip = new St.PageFlip(bookContainer, {
                width:    pageW,
                height:   pageH,
                size:     "fixed",
                drawShadow:        true,
                maxShadowOpacity:  0.6,
                showCover:         true,
                usePortrait:       isMobile,   // portrait (single page) on mobile
                flippingTime:      1000,
                swipeDistance:     30,
                clickEventForward: true
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            // Update page counter
            function updateInfo() {
                const cur   = pageFlip.getCurrentPageIndex() + 1;
                const total = customPageOrder.length;
                pageInfo.textContent = `Page ${cur} of ${total}`;
            }

            pageFlip.on('flip', updateInfo);

            // Show UI
            loader.style.display   = 'none';
            bookContainer.style.display = 'block';
            controls.style.display = 'flex';
            pageInfo.style.display = 'block';
            updateInfo();

            btnPrev.addEventListener('click', () => pageFlip.flipPrev());
            btnNext.addEventListener('click', () => pageFlip.flipNext());
        });
    </script>
</body>
</html>
